server {
    listen 80;
    server_name bm-backend.ovh www.bm-backend.ovh;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bm-backend.ovh www.bm-backend.ovh;

    ssl_certificate /etc/letsencrypt/live/bm-backend.ovh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bm-backend.ovh/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}