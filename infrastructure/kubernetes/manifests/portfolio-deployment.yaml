apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-django
  namespace: pdf-api
  labels:
    app: portfolio-django
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-django
  template:
    metadata:
      labels:
        app: portfolio-django
    spec:
      containers:
      - name: portfolio-django
        image: portfolio-django:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
          name: http
        envFrom:
        - secretRef:
            name: portfolio-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "125m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /admin/
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /admin/
            port: 8002
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3